<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Petty Cash</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <header class="app-header">
    <div class="title-row">
      <h1>Petty&nbsp;Cash</h1>
      <button id="settingsBtn" class="icon-btn" aria-label="Settings">&#9881;</button>
    </div>
    <div id="connState" class="conn-state offline">Offline mode</div>
  </header>

  <main>
    <!-- Wave balance -->
    <section class="card wave-card">
      <div class="wave-head">
        <span class="wave-label">Wave balance</span>
        <button id="editWaveBtn" class="link-btn">Set</button>
      </div>
      <div id="waveBalance" class="wave-amount">&mdash; XOF</div>
      <div id="waveEditRow" class="wave-edit hidden">
        <input id="waveInput" type="text" inputmode="numeric" placeholder="Enter balance">
        <button id="saveWaveBtn" class="btn small">Save</button>
        <button id="cancelWaveBtn" class="btn small ghost">Cancel</button>
      </div>
    </section>

    <!-- Transaction form -->
    <form id="txForm" class="card" autocomplete="off" novalidate>
      <label class="field">
        <span class="field-label">Beneficiary <em>(demandeur)</em></span>
        <input id="beneficiary" type="text" placeholder="e.g. Sister Mowkele" required>
      </label>

      <label class="field">
        <span class="field-label">Account</span>
        <select id="account" required>
          <option value="" disabled selected>Choose an account&hellip;</option>
        </select>
      </label>
      <div id="accountChip" class="account-chip hidden"></div>

      <label class="field">
        <span class="field-label">Description <em>(but)</em></span>
        <textarea id="description" rows="2" placeholder="Purpose of the expense"></textarea>
      </label>

      <div class="field">
        <span class="field-label">Amount</span>
        <div class="amount-row">
          <button type="button" id="signBtn" class="sign-btn" aria-label="Toggle positive / negative">+</button>
          <input id="amount" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="0" autocomplete="off">
          <span class="cur">XOF</span>
        </div>
        <div id="amountPreview" class="amount-preview">0 XOF</div>
      </div>

      <div class="field">
        <span class="field-label">Method</span>
        <div class="method-row" id="methodRow">
          <button type="button" class="method-btn" data-method="cash"><span class="m-emoji">&#128181;</span><span>Cash</span></button>
          <button type="button" class="method-btn" data-method="wave"><span class="m-emoji">&#127754;</span><span>Wave</span></button>
          <button type="button" class="method-btn" data-method="orange"><span class="m-emoji">&#128992;</span><span>Orange</span></button>
        </div>
        <div id="waveNote" class="wave-note hidden">This amount will be subtracted from your Wave balance.</div>
      </div>

      <div class="field">
        <span class="field-label">Receipt photo</span>
        <div class="photo-actions">
          <label class="btn ghost">&#128247; Camera
            <input type="file" accept="image/*" capture="environment" id="receiptCam" hidden>
          </label>
          <label class="btn ghost">&#128444;&#65039; Gallery
            <input type="file" accept="image/*" id="receiptGal" hidden>
          </label>
        </div>
        <div id="receiptPreview" class="preview hidden"></div>
      </div>

      <div class="field hidden" id="waveReceiptField">
        <span class="field-label">Wave receipt / screenshot</span>
        <div class="photo-actions">
          <label class="btn ghost">&#128247; Camera
            <input type="file" accept="image/*" capture="environment" id="waveCam" hidden>
          </label>
          <label class="btn ghost">&#128444;&#65039; Gallery
            <input type="file" accept="image/*" id="waveGal" hidden>
          </label>
        </div>
        <div id="wavePreview" class="preview hidden"></div>
      </div>

      <button type="submit" class="btn primary big" id="submitBtn">Save transaction</button>
    </form>

    <div id="outbox" class="outbox hidden">
      <span id="outboxText"></span>
      <button id="syncBtn" class="link-btn">Sync now</button>
    </div>
  </main>

  <div id="toast" class="toast hidden"></div>

  <!-- Settings modal -->
  <div id="settingsModal" class="modal hidden">
    <div class="modal-card">
      <h2>Settings</h2>
      <label class="field">
        <span class="field-label">Backend API URL</span>
        <input id="apiUrlInput" type="url" placeholder="https://your-app.vercel.app/api">
      </label>
      <p class="hint">Leave empty to stay in offline mode. Submissions queue on this
        phone until a backend is set and reachable.</p>
      <div class="modal-actions">
        <button id="saveSettings" class="btn primary">Save</button>
        <button id="closeSettings" class="btn ghost">Close</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>

</html>
